name: Lint

on:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: pip install black flake8 isort

      - name: Check black formatting
        run: black --check --config pyproject.toml prism/ tests/

      - name: Check isort import ordering
        run: isort --check-only --settings-path setup.cfg prism/ tests/

      - name: Run flake8
        run: flake8 prism/ tests/
