# Configuration for the htx_example demo dataset.
#
# htx_example is a small (~5,000-row) fully synthetic heart-transplant dataset
# bundled with the package. It preserves the statistical properties of UNOS
# registry data (no patient rows are replicated), and is sized and tuned for a
# fast first PRiSM run.

# =============================================================================
# REQUIRED FIELDS FOR PIPELINE RUNNERS
# =============================================================================
# Dataset name (maps to data/raw/{dataset}.csv)
dataset: htx_example

# Models to train and analyze. Single model keeps the first run fast;
# add xgb, logreg, rf to reproduce the full model set.
models: [mlp]

# =============================================================================
# PREPROCESSING SETTINGS
# =============================================================================
# Random seed for reproducibility
random_seed: 257

# Target and ID variables
target_candidates: ['MORTALITY_365D']
id_candidates: ['TRR_ID_CODE']

# Variable display labels so nomogram plots show human-readable names.
label_file_candidates: ['htx_example_variable_labels.csv']

# Data splitting: predefined train/val/test assignments in the 'split' column.
splitting_method: 'predefined'
split_column: 'split'
drop_split_column: true

# Categorical encoding: binary->ordinal, multi-category->one-hot
force_all_ordinal: false
convert_numeric: true
categorical_threshold: 8

# Target inversion: keep 1=died as positive class
invert_target: false

# Reference column selection for one-hot encoded categorical variables
# Options: 'alphabetical', 'most_common', 'manual'
reference_column_strategy: 'most_common'

# ============================================================================
# PRISM ANALYSIS CONFIGURATION
# ============================================================================
# Partial response calculation method ('lebesgue' recommended, or 'dirac')
partial_response_method: 'lebesgue'
# Trim quantile for plot variable ranges (null = full range)
trim_quantile: null
# Save nomogram JSON files for later use/reproduction
save_nomogram_json: true
# Save generated figures to disk
save_figs: false

# ============================================================================
# HYPERPARAMETER TUNING CONFIGURATION
# ============================================================================
# Disabled by default so the demo run is fast and deterministic (uses the global
# default MLP hyperparameters). Set enabled: true (and n_trials) to tune via Optuna.
hyperparameter_tuning:
  enabled: false
  n_jobs: 8
  metric: 'test_auc'
  n_trials: 32

# ============================================================================
# LASSO Lambda Selection
# ============================================================================
# max_test_auc selects the sparsest lambda achieving target_ratio of the maximum
# test AUROC. 0.998 matches the value used in the published study.
lasso_lambda_selection:
  blackbox:
    method: 'max_test_auc'
    target_ratio: 0.998
    beta_threshold: 0.1
  prn:
    method: 'max_test_auc'
    target_ratio: 0.998
    beta_threshold: 0.1
